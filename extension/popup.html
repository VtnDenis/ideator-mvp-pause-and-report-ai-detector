<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fafaf9;
      color: #1c1917;
    }
    .header {
      background: #059669;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header span { font-size: 18px; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .content { padding: 16px; }
    .info {
      font-size: 13px;
      color: #78716c;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #047857; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 12px; }
    .score {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      background: white;
      border: 1px solid #e7e5e4;
    }
    .score .pct { font-size: 28px; font-weight: 800; }
    .score .label { font-size: 12px; color: #78716c; margin-top: 2px; }
    .score .bar {
      margin-top: 8px;
      height: 6px;
      background: #f5f5f4;
      border-radius: 3px;
      overflow: hidden;
    }
    .score .bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .footer {
      border-top: 1px solid #e7e5e4;
      padding: 10px 16px;
      font-size: 11px;
      color: #a8a29e;
      text-align: center;
    }
    .footer a { color: #059669; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span>&#9888;</span>
    <h1>Pause & Report</h1>
  </div>
  <div class="content">
    <p class="info">
      Scan the document you have open for robotic-sounding sentences.
      Your text is sent to our analysis API.
    </p>
    <button id="scanBtn" class="btn">Scan Current Document</button>
    <div id="result" class="result" style="display:none">
      <div class="score">
        <div class="pct" id="humanScore">0%</div>
        <div class="label">Human Score</div>
        <div class="bar">
          <div class="fill" id="scoreBar" style="width:0%"></div>
        </div>
        <div style="margin-top:6px;font-size:13px;color:#78716c">
          <span id="flaggedCount">0</span> flagged sentences
        </div>
      </div>
    </div>
    <div id="error" style="display:none;margin-top:12px;padding:10px;background:#fee2e2;color:#dc2626;border-radius:8px;font-size:13px"></div>
  </div>
  <div class="footer">
    <a href="https://pause-and-report.vercel.app" target="_blank">Open full web app &rarr;</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
